<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>SignalK Updater</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="./app-icon.svg" />
    <!--
      Pick the Bootstrap 5 color mode before React mounts so the first
      paint is correct (avoids a flash of the wrong theme). Bootstrap
      keys colors off [data-bs-theme] on <html>; setting it here means
      we don't need a ThemeProvider for the basic light/dark flip.
      An OS theme change re-runs the listener installed inside React.
    -->
    <script>
      (function () {
        try {
          var prefersDark =
            window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-bs-theme', prefersDark ? 'dark' : 'light');
        } catch (_) {
          document.documentElement.setAttribute('data-bs-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
